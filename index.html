<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Dashboard — Cargando...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #0a0e27;
            color: #e8eaf6;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        h1 { margin: 0 0 0.5rem 0; }
        p { color: #9ca3af; }
        .spinner {
            border: 3px solid #2a3154;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Investment Dashboard</h1>
        <p>Generando valoraciones...</p>
        <div class="spinner"></div>
        <p style="font-size: 0.85rem; margin-top: 2rem;">
            El dashboard se actualiza automáticamente.<br/>
            Si ves esto, espera a que se genere el HTML.
        </p>
    </div>
</body>
</html>
